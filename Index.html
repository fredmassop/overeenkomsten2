<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Overeenkomsten — 5 mei 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--ink:#1e2235;--ink2:#5a607a;--paper:#f4f6fb;--card:#fff;--border:#dde1ed;
  --accent:#d64f3b;--accent2:#2d72b8;--success:#1f8c5a;--gold:#c9922a;--cream:#eaecf4;--r:14px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh}

/* HEADER */
.hdr{background:var(--ink);color:#fff;padding:.9rem 1rem .75rem;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem}
.hdr h1{font-size:1.05rem;font-weight:700}
.hdr-sub{font-size:.7rem;color:rgba(255,255,255,.5);margin-top:.05rem}
.search-box{position:relative}
.search-box input{width:100%;padding:.52rem .9rem .52rem 2.3rem;border:none;border-radius:10px;
  background:rgba(255,255,255,.11);color:#fff;font-size:.9rem;outline:none}
.search-box input::placeholder{color:rgba(255,255,255,.4)}
.s-icon{position:absolute;left:.72rem;top:50%;transform:translateY(-50%);opacity:.55;pointer-events:none}

/* FILTERS */
.filter-bar{display:flex;gap:.45rem;padding:.65rem 1rem;overflow-x:auto;background:var(--card);
  border-bottom:1px solid var(--border);scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.filter-chip{flex-shrink:0;padding:.3rem .85rem;border-radius:20px;
  border:1.5px solid var(--border);background:var(--paper);font-size:.78rem;
  cursor:pointer;color:var(--ink2);font-family:inherit;white-space:nowrap;transition:all .15s}
.filter-chip.active{background:var(--accent2);border-color:var(--accent2);color:#fff;font-weight:600}

/* TOTALEN */
.totalen{display:grid;grid-template-columns:1fr 1fr;gap:.55rem;padding:.8rem 1rem;background:var(--paper)}
.tot-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:.65rem .85rem;position:relative;overflow:hidden}
.tot-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px}
.tc-blue::after{background:var(--accent2)}.tc-red::after{background:var(--accent)}
.tc-green::after{background:var(--success)}.tc-amber::after{background:var(--gold)}
.tot-label{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink2)}
.tot-value{font-size:1.1rem;font-weight:700;margin-top:.18rem;line-height:1.1}
.c-red{color:var(--accent)}.c-green{color:var(--success)}.c-blue{color:var(--accent2)}.c-amber{color:var(--gold)}

/* TELREGEL */
.count-bar{padding:.4rem 1rem;font-size:.75rem;color:var(--ink2);background:var(--paper);border-bottom:1px solid var(--border)}

/* KAARTEN */
.kaarten{padding:.7rem 1rem;display:flex;flex-direction:column;gap:.55rem}
.kaart{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:.8rem 1rem;box-shadow:0 1px 5px rgba(30,34,53,.05);cursor:pointer;transition:box-shadow .15s}
.kaart:active{box-shadow:0 3px 14px rgba(30,34,53,.14)}
.kaart.exp{border-left:4px solid var(--accent)}.kaart.soon{border-left:4px solid var(--gold)}
.kaart-top{display:flex;align-items:flex-start;gap:.55rem}
.k-cat{font-size:.67rem;font-weight:700;padding:.16rem .48rem;border-radius:20px;
  background:#deeaf9;color:var(--accent2);white-space:nowrap;flex-shrink:0;margin-top:.12rem}
.k-midden{flex:1;min-width:0}
.k-soort{font-size:.9rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.k-partij{font-size:.78rem;color:var(--ink2);margin-top:.08rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.k-bedrag{font-size:.97rem;font-weight:700;color:var(--accent);flex-shrink:0;white-space:nowrap;margin-top:.05rem}
.k-bedrag.groen{color:var(--success)}
.kaart-footer{display:flex;align-items:center;gap:.45rem;margin-top:.5rem;flex-wrap:wrap}
.sbadge{font-size:.67rem;font-weight:700;padding:.14rem .48rem;border-radius:20px}
.sb-g{background:#d4f0e3;color:var(--success)}.sb-r{background:#fde4e0;color:var(--accent)}
.sb-o{background:#feefd0;color:#a06010}.sb-x{background:var(--cream);color:var(--ink2)}
.v-lbl{font-size:.72rem;color:var(--ink2)}
.v-lbl.soon{color:var(--gold);font-weight:600}.v-lbl.exp{color:var(--accent);font-weight:600}
.k-toelic{font-size:.76rem;color:var(--ink2);margin-top:.38rem;border-top:1px solid var(--cream);padding-top:.38rem;line-height:1.4}

/* DETAIL SHEET */
.backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;backdrop-filter:blur(3px)}
.backdrop.open{display:block}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:20px 20px 0 0;
  z-index:51;max-height:88vh;overflow-y:auto;
  transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
  padding-bottom:max(env(safe-area-inset-bottom),16px)}
.sheet.open{transform:none}
.s-handle{width:40px;height:4px;background:var(--border);border-radius:4px;margin:10px auto 0}
.s-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:.85rem 1.2rem .55rem;border-bottom:1px solid var(--border)}
.s-hdr h2{font-size:.98rem;font-weight:700}
.s-close{background:var(--cream);border:none;border-radius:8px;padding:.28rem .65rem;
  font-size:1rem;cursor:pointer;color:var(--ink2);font-family:inherit}
.s-body{padding:1rem 1.2rem 1.5rem}
.dl{display:grid;grid-template-columns:1fr 1.5fr;gap:.28rem .7rem;margin-bottom:.85rem}
.dt{font-size:.73rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink2);padding-top:.22rem}
.dd{font-size:.88rem;color:var(--ink);word-break:break-word}
.dd a{color:var(--accent2)}
.s-sectie{font-size:.71rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink2);
  border-top:1px solid var(--border);padding-top:.7rem;margin-bottom:.45rem}
.leeg{text-align:center;padding:3rem 1rem;color:var(--ink2);font-size:.9rem}
.leeg-icon{font-size:2.5rem;margin-bottom:.6rem}
</style>
</head>

const fmt = v => {
  const n = parseFloat(v);
  if(!v&&v!==0||isNaN(n)||n===0) return '—';
  const p = Math.abs(n).toFixed(2).split('.');
  p[0] = p[0].replace(/\B(?=(\d{3})+(?!\d))/g,'.');
  return '\u20ac\u00a0'+p[0]+','+p[1];
};
const esc  = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fdt  = s => { if(!s) return '—'; const[y,m,d]=s.split('-'); return d+'-'+m+'-'+y; };
const diff = v => v ? Math.round((new Date(v)-new Date().setHours(0,0,0,0))/86400000) : null;
const sbCls= s => s==='Actief'?'sb-g':s==='Opgezegd'?'sb-r':s==='In onderhandeling'?'sb-o':'sb-x';

let activeCat = '';

// Filter chips
document.getElementById('filterBar').addEventListener('click', function(e) {
  const chip = e.target.closest('.filter-chip');
  if (!chip) return;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  activeCat = chip.dataset.cat;
  render();
});

// Zoeken
document.getElementById('zoek').addEventListener('input', render);

// Sheet sluiten
document.getElementById('backdrop').addEventListener('click', closeSheet);
document.getElementById('sheetClose').addEventListener('click', closeSheet);

function render() {
  const q = document.getElementById('zoek').value.toLowerCase();
  const rows = DATA.filter(r => {
    if (activeCat && r.cat !== activeCat) return false;
    if (q) {
      const all = [r.cat,r.soort,r.partij,r.status,r.toelic].join(' ').toLowerCase();
      if (!all.includes(q)) return false;
    }
    return true;
  }).sort((a,b) => a.cat<b.cat?-1:a.cat>b.cat?1:a.soort<b.soort?-1:a.soort>b.soort?1:0);

  document.getElementById('countBar').textContent = rows.length + ' van ' + DATA.length + ' overeenkomsten';

  if (!rows.length) {
    document.getElementById('kaarten').innerHTML = '<div class="leeg"><div class="leeg-icon">\uD83D\uDCC2</div>Geen overeenkomsten gevonden.</div>';
    return;
  }

  document.getElementById('kaarten').innerHTML = rows.map(r => {
    const d = diff(r.verval);
    let rowCls='', vLbl='';
    if(d!==null){
      if(d<0){rowCls='exp';vLbl=`<span class="v-lbl exp">\u26a0 Verlopen ${Math.abs(d)}d geleden</span>`;}
      else if(d<=30){rowCls='soon';vLbl=`<span class="v-lbl soon">\u26a0 ${fdt(r.verval)} \u00b7 ${d}d</span>`;}
      else{vLbl=`<span class="v-lbl">${fdt(r.verval)}</span>`;}
    }
    const bedrag = r.netto<0
      ? `<span class="k-bedrag groen">\u2212\u00a0${fmt(Math.abs(r.netto)).slice(3)}</span>`
      : r.maand ? `<span class="k-bedrag">${fmt(r.maand)}/mnd</span>`
      : r.opb   ? `<span class="k-bedrag groen">\u2212\u00a0${fmt(r.opb).slice(3)}</span>`
      : r.bet   ? `<span class="k-bedrag">${fmt(r.bet)}</span>`
      : '';
    return `<div class="kaart ${rowCls}" data-id="${r.id}">
      <div class="kaart-top">
        <span class="k-cat">${esc(r.cat)}</span>
        <div class="k-midden">
          <div class="k-soort">${esc(r.soort)}</div>
          <div class="k-partij">${esc(r.partij)}</div>
        </div>
        ${bedrag}
      </div>
      <div class="kaart-footer">
        <span class="sbadge ${sbCls(r.status)}">${esc(r.status)}</span>
        ${vLbl}
      </div>
      ${r.toelic?`<div class="k-toelic">${esc(r.toelic)}</div>`:''}
    </div>`;
  }).join('');

  // Klik-handler via delegatie
  document.getElementById('kaarten').onclick = function(e) {
    const k = e.target.closest('.kaart');
    if (k) openSheet(k.dataset.id);
  };
}

function openSheet(id) {
  const r = DATA.find(x=>x.id===id); if(!r) return;
  const d = diff(r.verval);
  let vTxt = fdt(r.verval);
  if(d!==null){
    if(d<0) vTxt+=` (\u26a0 ${Math.abs(d)}d verlopen)`;
    else if(d===0) vTxt+=' (\u26a0 vandaag!)';
    else if(d<=30) vTxt+=` (nog ${d} dagen)`;
  }

  document.getElementById('sheetTitle').textContent = r.soort||r.cat;

  const rw = (l,v) => v&&v!=='\u2014'?`<span class="dt">${l}</span><span class="dd">${v}</span>`:'';
  let h = '<div class="dl">';
  h += rw('Categorie',   esc(r.cat));
  h += rw('Soort',       esc(r.soort));
  h += rw('Partij',      esc(r.partij));
  h += rw('Status',      esc(r.status));
  h += rw('Vervaldatum', vTxt!=='\u2014'?vTxt:'');
  h += rw('Toelichting', esc(r.toelic));
  h += '</div>';

  if(r.maand||r.netto){
    h += '<div class="s-sectie">\uD83D\uDCB3 Kosten</div><div class="dl">';
    h += rw('Per maand', fmt(r.maand));
    const nettoTxt = r.netto<0
      ? '\u2212\u00a0'+fmt(Math.abs(r.netto)).slice(3)+' (opbrengst)'
      : fmt(r.netto);
    h += rw('Saldo per jaar', nettoTxt);
    h += '</div>';
  }
  if(r.opb){
    h += '<div class="s-sectie">\uD83D\uDCB0 Opbrengst</div><div class="dl">';
    h += rw('Opbrengst/jaar','\u2212\u00a0'+fmt(r.opb).slice(3));
    h += '</div>';
  }
  if(r.bet||r.nog){
    h += '<div class="s-sectie">\uD83D\uDCCB Incidenteel</div><div class="dl">';
    if(r.bet) h += rw('Betaald', fmt(r.bet));
    if(r.nog) h += rw('Nog te betalen', fmt(r.nog));
    h += '</div>';
  }
  if(r.web){
    h += '<div class="s-sectie">\uD83D\uDD17 Website</div>';
    h += `<a href="${esc(r.web)}" target="_blank" style="font-size:.88rem;color:var(--accent2);word-break:break-all">${esc(r.web)}</a>`;
  }

  document.getElementById('sheetBody').innerHTML = h;
  document.getElementById('sheet').classList.add('open');
  document.getElementById('backdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeSheet() {
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('backdrop').classList.remove('open');
  document.body.style.overflow = '';
}

render();
</script>
